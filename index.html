<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>台股查價工具</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
    --border: #30363d; --text: #e6edf3; --text2: #8b949e;
    --green: #3fb950; --red: #f85149; --blue: #58a6ff; --yellow: #d29922;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; font-size: 14px; min-height: 100vh; }

  header { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 16px 20px; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 15px; font-weight: 700; }

  .container { max-width: 900px; margin: 0 auto; padding: 20px; }

  .search-bar { display: flex; gap: 10px; margin-bottom: 24px; }
  .search-bar input { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'Noto Sans TC', sans-serif; font-size: 15px; padding: 10px 16px; outline: none; flex: 1; transition: border-color 0.15s; }
  .search-bar input:focus { border-color: var(--blue); }
  .btn { border: none; border-radius: 8px; cursor: pointer; font-family: 'Noto Sans TC', sans-serif; font-size: 14px; font-weight: 700; padding: 10px 24px; background: var(--blue); color: #0d1117; transition: opacity 0.15s; }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  .error { background: rgba(248,81,73,0.1); border: 1px solid rgba(248,81,73,0.3); border-radius: 8px; color: var(--red); padding: 14px 16px; margin-bottom: 20px; display: none; }

  .result { display: none; }

  /* 基本資訊 */
  .stock-header { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 20px; margin-bottom: 16px; }
  .stock-title { display: flex; align-items: baseline; gap: 10px; margin-bottom: 16px; }
  .stock-title h2 { font-size: 20px; font-weight: 700; }
  .stock-title span { color: var(--text2); font-size: 14px; }
  .stock-price { display: flex; align-items: baseline; gap: 12px; }
  .price-main { font-family: 'JetBrains Mono', monospace; font-size: 36px; font-weight: 700; }
  .price-change { font-family: 'JetBrains Mono', monospace; font-size: 18px; }
  .up { color: var(--red); } /* 台股紅漲綠跌 */
  .down { color: var(--green); }
  .flat { color: var(--text2); }

  /* 數據格子 */
  .data-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px; }
  .data-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 8px; padding: 14px; }
  .data-card .label { font-size: 10px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
  .data-card .value { font-family: 'JetBrains Mono', monospace; font-size: 16px; font-weight: 600; }

  /* 均線 */
  .ma-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 16px; }
  .ma-card h3 { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }
  .ma-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
  .ma-item { text-align: center; }
  .ma-item .ma-label { font-size: 11px; color: var(--text2); margin-bottom: 4px; }
  .ma-item .ma-value { font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 600; }
  .ma-item .ma-signal { font-size: 11px; margin-top: 3px; }

  /* 籌碼 */
  .chip-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 16px; }
  .chip-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 18px; }
  .chip-card h3 { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 12px; }
  .chip-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); }
  .chip-row:last-child { border-bottom: none; }
  .chip-row .chip-label { font-size: 13px; color: var(--text2); }
  .chip-row .chip-value { font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 600; }

  /* K線圖 */
  .chart-card { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; padding: 18px; margin-bottom: 16px; }
  .chart-card h3 { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }
  .chart-wrap { position: relative; height: 220px; }

  .loading-overlay { text-align: center; padding: 60px; color: var(--text2); display: none; }

  @media (max-width: 640px) {
    .data-grid { grid-template-columns: repeat(2, 1fr); }
    .chip-grid { grid-template-columns: 1fr; }
    .ma-grid { grid-template-columns: repeat(3, 1fr); }
    .price-main { font-size: 28px; }
  }
</style>
</head>
<body>

<header>
  <h1>📈 台股查價工具</h1>
</header>

<div class="container">
  <div class="search-bar">
    <input type="text" id="stock-input" placeholder="輸入股票代號（例如：2330）" maxlength="6">
    <button class="btn" id="search-btn" onclick="searchStock()">查詢</button>
  </div>

  <div class="error" id="error-box"></div>
  <div class="loading-overlay" id="loading">查詢中，請稍候…</div>

  <div class="result" id="result">
    <!-- 基本資訊 -->
    <div class="stock-header">
      <div class="stock-title">
        <h2 id="r-name">—</h2>
        <span id="r-code">—</span>
      </div>
      <div class="stock-price">
        <div class="price-main" id="r-price">—</div>
        <div class="price-change" id="r-change">—</div>
      </div>
    </div>

    <!-- 基本數據 -->
    <div class="data-grid">
      <div class="data-card"><div class="label">開盤</div><div class="value" id="r-open">—</div></div>
      <div class="data-card"><div class="label">最高</div><div class="value" id="r-high">—</div></div>
      <div class="data-card"><div class="label">最低</div><div class="value" id="r-low">—</div></div>
      <div class="data-card"><div class="label">成交量（張）</div><div class="value" id="r-vol">—</div></div>
    </div>

    <!-- 均線 -->
    <div class="ma-card">
      <h3>均線</h3>
      <div class="ma-grid">
        <div class="ma-item">
          <div class="ma-label">MA5（5日）</div>
          <div class="ma-value" id="r-ma5">—</div>
          <div class="ma-signal" id="r-ma5-sig"></div>
        </div>
        <div class="ma-item">
          <div class="ma-label">MA10（10日）</div>
          <div class="ma-value" id="r-ma10">—</div>
          <div class="ma-signal" id="r-ma10-sig"></div>
        </div>
        <div class="ma-item">
          <div class="ma-label">MA20（20日）</div>
          <div class="ma-value" id="r-ma20">—</div>
          <div class="ma-signal" id="r-ma20-sig"></div>
        </div>
      </div>
    </div>

    <!-- 籌碼 -->
    <div class="chip-grid">
      <div class="chip-card">
        <h3>融資融券</h3>
        <div class="chip-row"><span class="chip-label">融資餘額（張）</span><span class="chip-value" id="r-margin">—</span></div>
        <div class="chip-row"><span class="chip-label">融資增減</span><span class="chip-value" id="r-margin-chg">—</span></div>
        <div class="chip-row"><span class="chip-label">融券餘額（張）</span><span class="chip-value" id="r-short">—</span></div>
        <div class="chip-row"><span class="chip-label">融券增減</span><span class="chip-value" id="r-short-chg">—</span></div>
      </div>
      <div class="chip-card">
        <h3>三大法人買賣超（張）</h3>
        <div class="chip-row"><span class="chip-label">外資</span><span class="chip-value" id="r-foreign">—</span></div>
        <div class="chip-row"><span class="chip-label">投信</span><span class="chip-value" id="r-trust">—</span></div>
        <div class="chip-row"><span class="chip-label">自營商</span><span class="chip-value" id="r-dealer">—</span></div>
        <div class="chip-row"><span class="chip-label">合計</span><span class="chip-value" id="r-inst-total">—</span></div>
      </div>
    </div>

    <!-- K線圖 -->
    <div class="chart-card">
      <h3>近30日收盤走勢</h3>
      <div class="chart-wrap">
        <canvas id="price-chart"></canvas>
      </div>
    </div>
  </div>
</div>

<script>
  let priceChart = null;

  document.getElementById('stock-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') searchStock();
  });

  function showError(msg) {
    const box = document.getElementById('error-box');
    box.textContent = msg;
    box.style.display = 'block';
    document.getElementById('result').style.display = 'none';
    document.getElementById('loading').style.display = 'none';
  }

  function hideError() {
    document.getElementById('error-box').style.display = 'none';
  }

  function fmt(n) {
    if (n === null || n === undefined || n === '' || isNaN(n)) return '—';
    return parseFloat(n).toLocaleString('zh-TW', { maximumFractionDigits: 2 });
  }

  function fmtChg(n) {
    if (n === null || isNaN(n)) return '—';
    const val = parseInt(n);
    if (val > 0) return `<span class="up">+${val.toLocaleString()}</span>`;
    if (val < 0) return `<span class="down">${val.toLocaleString()}</span>`;
    return `<span class="flat">0</span>`;
  }

  async function searchStock() {
    const code = document.getElementById('stock-input').value.trim();
    if (!code) { showError('請輸入股票代號'); return; }

    hideError();
    document.getElementById('loading').style.display = 'block';
    document.getElementById('result').style.display = 'none';
    document.getElementById('search-btn').disabled = true;

    try {
      // 1. 當日收盤價、成交量
      const dayRes = await fetch(`https://openapi.twse.com.tw/v1/exchangeReport/STOCK_DAY_ALL`);
      const dayData = await dayRes.json();
      const stock = dayData.find(s => s.Code === code);

      if (!stock) { showError(`查無股票代號 ${code}，請確認是否為上市股票`); return; }

      // 2. 歷史收盤（近2個月，用來算均線）
      const now = new Date();
      const yyyymm = `${now.getFullYear()}${String(now.getMonth() + 1).padStart(2, '0')}01`;
      const histRes = await fetch(`https://www.twse.com.tw/exchangeReport/STOCK_DAY?response=json&date=${yyyymm}&stockNo=${code}`);
      const histData = await histRes.json();

      // 上個月也抓
      const prev = new Date(now.getFullYear(), now.getMonth() - 1, 1);
      const yyyymmPrev = `${prev.getFullYear()}${String(prev.getMonth() + 1).padStart(2, '0')}01`;
      const histRes2 = await fetch(`https://www.twse.com.tw/exchangeReport/STOCK_DAY?response=json&date=${yyyymmPrev}&stockNo=${code}`);
      const histData2 = await histRes2.json();

      const allDays = [
        ...(histData2.data || []),
        ...(histData.data || [])
      ];

      const closes = allDays.map(d => parseFloat(d[6].replace(/,/g, ''))).filter(v => !isNaN(v));
      const dates = allDays.map(d => d[0]);

      // 均線計算
      const ma = (arr, n) => arr.length >= n ? (arr.slice(-n).reduce((a, b) => a + b, 0) / n).toFixed(2) : null;
      const ma5 = ma(closes, 5);
      const ma10 = ma(closes, 10);
      const ma20 = ma(closes, 20);
      const currentPrice = parseFloat(stock.ClosingPrice);

      // 3. 融資融券
      let marginData = null;
      try {
        const marginRes = await fetch(`https://openapi.twse.com.tw/v1/exchangeReport/MI_MARGN_CROSS`);
        const marginAll = await marginRes.json();
        marginData = marginAll.find(s => s.StockNo === code);
      } catch {}

      // 4. 三大法人
      let instData = null;
      try {
        const instRes = await fetch(`https://openapi.twse.com.tw/v1/exchangeReport/TWT38U_ALL`);
        const instAll = await instRes.json();
        instData = instAll.find(s => s.Code === code);
      } catch {}

      // 顯示結果
      document.getElementById('loading').style.display = 'none';
      document.getElementById('result').style.display = 'block';

      document.getElementById('r-name').textContent = stock.Name || '—';
      document.getElementById('r-code').textContent = code;

      const change = parseFloat(stock.Change);
      const priceEl = document.getElementById('r-price');
      priceEl.textContent = fmt(currentPrice);
      priceEl.className = 'price-main ' + (change > 0 ? 'up' : change < 0 ? 'down' : 'flat');

      const changeEl = document.getElementById('r-change');
      changeEl.innerHTML = fmtChg(change) + (change !== 0 ? ` (${change > 0 ? '+' : ''}${((change / (currentPrice - change)) * 100).toFixed(2)}%)` : '');

      document.getElementById('r-open').textContent = fmt(stock.OpeningPrice);
      document.getElementById('r-high').textContent = fmt(stock.HighestPrice);
      document.getElementById('r-low').textContent = fmt(stock.LowestPrice);
      document.getElementById('r-vol').textContent = parseInt(stock.TradeVolume / 1000).toLocaleString();

      // 均線與訊號
      const setMA = (id, sigId, maVal) => {
        if (!maVal) { document.getElementById(id).textContent = '資料不足'; return; }
        document.getElementById(id).textContent = maVal;
        const diff = ((currentPrice - maVal) / maVal * 100).toFixed(1);
        const sig = document.getElementById(sigId);
        if (currentPrice > maVal) {
          sig.innerHTML = `<span class="up">▲ 站上 +${diff}%</span>`;
        } else {
          sig.innerHTML = `<span class="down">▼ 跌破 ${diff}%</span>`;
        }
      };
      setMA('r-ma5', 'r-ma5-sig', ma5);
      setMA('r-ma10', 'r-ma10-sig', ma10);
      setMA('r-ma20', 'r-ma20-sig', ma20);

      // 融資融券
      if (marginData) {
        document.getElementById('r-margin').textContent = parseInt(marginData.MarginPurchaseBalance || 0).toLocaleString();
        document.getElementById('r-short').textContent = parseInt(marginData.ShortSaleBalance || 0).toLocaleString();
        document.getElementById('r-margin-chg').innerHTML = fmtChg(parseInt(marginData.MarginPurchaseBalance || 0) - parseInt(marginData.MarginPurchaseYesterdayBalance || 0));
        document.getElementById('r-short-chg').innerHTML = fmtChg(parseInt(marginData.ShortSaleBalance || 0) - parseInt(marginData.ShortSaleYesterdayBalance || 0));
      }

      // 三大法人
      if (instData) {
        const foreign = parseInt((instData.ForeignInvestmentBuy || 0)) - parseInt((instData.ForeignInvestmentSell || 0));
        const trust = parseInt((instData.InvestmentTrustBuy || 0)) - parseInt((instData.InvestmentTrustSell || 0));
        const dealer = parseInt((instData.DealerBuy || 0)) - parseInt((instData.DealerSell || 0));
        document.getElementById('r-foreign').innerHTML = fmtChg(foreign);
        document.getElementById('r-trust').innerHTML = fmtChg(trust);
        document.getElementById('r-dealer').innerHTML = fmtChg(dealer);
        document.getElementById('r-inst-total').innerHTML = fmtChg(foreign + trust + dealer);
      }

      // K線走勢圖（近30日）
      const last30 = allDays.slice(-30);
      const chartDates = last30.map(d => d[0].replace(/\//g, '/'));
      const chartCloses = last30.map(d => parseFloat(d[6].replace(/,/g, '')));
      const chartMa5 = chartCloses.map((_, i, arr) => i >= 4 ? (arr.slice(i-4, i+1).reduce((a,b)=>a+b,0)/5).toFixed(2) : null);
      const chartMa10 = chartCloses.map((_, i, arr) => i >= 9 ? (arr.slice(i-9, i+1).reduce((a,b)=>a+b,0)/10).toFixed(2) : null);

      if (priceChart) priceChart.destroy();
      const ctx = document.getElementById('price-chart').getContext('2d');
      priceChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: chartDates,
          datasets: [
            { label: '收盤價', data: chartCloses, borderColor: '#58a6ff', backgroundColor: 'rgba(88,166,255,0.08)', borderWidth: 2, pointRadius: 2, tension: 0.3, fill: true },
            { label: 'MA5', data: chartMa5, borderColor: '#f85149', borderWidth: 1.5, pointRadius: 0, tension: 0.3 },
            { label: 'MA10', data: chartMa10, borderColor: '#3fb950', borderWidth: 1.5, pointRadius: 0, tension: 0.3 },
          ]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { labels: { color: '#8b949e', font: { size: 11 } } } },
          scales: {
            x: { ticks: { color: '#8b949e', font: { size: 10 }, maxTicksLimit: 8 }, grid: { color: '#21262d' } },
            y: { ticks: { color: '#8b949e', font: { size: 10 } }, grid: { color: '#21262d' } }
          }
        }
      });

    } catch (err) {
      showError('查詢失敗，請稍後再試（' + err.message + '）');
    } finally {
      document.getElementById('search-btn').disabled = false;
    }
  }
</script>
</body>
</html>
